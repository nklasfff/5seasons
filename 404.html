    <script>
      // Apply stored theme before CSS loads to prevent a flash of the
      // wrong colour scheme.
      (function () {
        try {
          var t = localStorage.getItem('fiveseasons:theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
